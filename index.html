<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MBTI 推定ノート</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#88619a">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MBTI推定">
<style>
  :root{
    --bg:#f4f3f7; --card:#ffffff; --ink:#2b2b33; --sub:#7a7a88; --line:#e6e4ee;
    --accent:#88619a; --shadow:0 2px 12px rgba(40,30,60,.08);
    --c-mind:#4298b4; --c-energy:#e4ae3a; --c-nature:#33a474; --c-tactics:#88619a; --c-identity:#f25e62;
    --g-analyst:#88619a; --g-diplomat:#33a474; --g-sentinel:#4298b4; --g-explorer:#e4ae3a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:var(--bg);color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic UI","Segoe UI",Meiryo,sans-serif;}
  body{padding:max(12px,env(safe-area-inset-top)) 12px 40px;}
  h1{font-size:19px;margin:0;letter-spacing:.02em;}
  .topbar{max-width:1080px;margin:0 auto 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .topbar .grow{flex:1;}
  .logo{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#88619a,#f25e62);
    display:grid;place-items:center;color:#fff;font-weight:800;font-size:15px;}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:10px;font-size:13px;
    padding:9px 13px;background:var(--accent);color:#fff;font-weight:700;transition:filter .15s,transform .05s;}
  button:hover{filter:brightness(1.06);} button:active{transform:translateY(1px);}
  button.ghost{background:#fff;color:var(--ink);border:1px solid var(--line);font-weight:600;}
  button.mini{padding:5px 9px;font-size:12px;border-radius:8px;}
  .app{max-width:1080px;margin:0 auto;display:grid;grid-template-columns:300px 1fr;gap:16px;align-items:start;}
  @media(max-width:760px){ .app{grid-template-columns:1fr;} }

  .panel{background:var(--card);border-radius:16px;box-shadow:var(--shadow);overflow:hidden;}
  .roster-head{display:flex;align-items:center;gap:8px;padding:13px 14px;border-bottom:1px solid var(--line);}
  .roster-head h2{font-size:14px;margin:0;flex:1;color:var(--sub);font-weight:700;letter-spacing:.04em;}
  .roster-list{max-height:62vh;overflow:auto;}
  @media(max-width:760px){ .roster-list{max-height:34vh;} }
  .person{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--line);cursor:pointer;}
  .person:hover{background:#faf9fd;}
  .person.active{background:#f3eef8;box-shadow:inset 3px 0 0 var(--accent);}
  .person .nm{flex:1;font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .badge{font-size:11px;font-weight:800;color:#fff;padding:3px 7px;border-radius:7px;letter-spacing:.03em;white-space:nowrap;}
  .person .del{opacity:0;color:var(--sub);background:none;padding:2px 6px;font-size:16px;font-weight:700;}
  .person:hover .del{opacity:.6;} .person .del:hover{opacity:1;color:#e0484d;}
  .empty{padding:26px 18px;color:var(--sub);font-size:13px;line-height:1.7;text-align:center;}

  .detail{padding:18px;}
  .namerow{display:flex;gap:10px;align-items:center;margin-bottom:6px;}
  .nameInput{flex:1;font-size:20px;font-weight:800;border:none;border-bottom:2px solid transparent;
    padding:4px 2px;background:none;color:var(--ink);}
  .nameInput:focus{outline:none;border-bottom-color:var(--accent);}
  .memo{width:100%;border:1px solid var(--line);border-radius:10px;padding:9px 11px;font-size:13px;
    color:var(--ink);resize:vertical;min-height:40px;margin-bottom:8px;font-family:inherit;background:#fcfbfe;}
  .memo:focus{outline:none;border-color:var(--accent);}

  .result{border-radius:14px;padding:16px;color:#fff;margin:6px 0 8px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  .result .code{font-size:34px;font-weight:900;letter-spacing:.04em;line-height:1;}
  .result .meta{flex:1;min-width:170px;}
  .result .tname{font-size:18px;font-weight:800;}
  .result .grp{font-size:12px;opacity:.9;font-weight:700;margin-top:2px;}
  .result .desc{font-size:12.5px;opacity:.97;margin-top:7px;line-height:1.6;}
  .clarity-wrap{margin:0 0 14px;}
  .clarity-badge{display:inline-block;color:#fff;font-weight:800;font-size:12px;padding:5px 11px;border-radius:20px;}

  .diag{margin:0 0 6px;}
  .diag-toggle{width:100%;text-align:left;background:#f3eef8;color:var(--accent);font-weight:800;font-size:13px;border:1px solid var(--line);}
  .diag-body{margin-top:10px;background:#fcfbfe;border:1px solid var(--line);border-radius:12px;padding:4px 14px 12px;}
  .diag-sec{margin-top:12px;}
  .diag-sec h4{font-size:13px;margin:0 0 5px;color:var(--accent);border-left:3px solid var(--accent);padding-left:7px;}
  .diag-sec p{font-size:12.7px;line-height:1.72;margin:0;}
  .diag-sec ul{margin:0;padding-left:18px;}
  .diag-sec li{font-size:12.7px;line-height:1.7;margin-bottom:4px;}

  .sec-title{font-size:14px;font-weight:800;margin:24px 0 10px;padding-bottom:6px;border-bottom:2px solid var(--line);}
  .sec-title .sub{font-size:11px;font-weight:600;color:var(--sub);}

  .axis{margin:16px 2px;}
  .lab-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
  .lab{font-size:14px;font-weight:700;flex:1;}
  .lab .pct{font-weight:900;}
  .stag{font-size:10px;font-weight:800;color:#fff;padding:2px 6px;border-radius:6px;margin-left:4px;vertical-align:middle;}
  .qbtn{width:22px;height:22px;padding:0;border-radius:50%;background:#eceaf3;color:var(--sub);font-weight:800;font-size:13px;line-height:1;}
  .qbtn:hover{background:var(--accent);color:#fff;}
  .axis input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:9px;border-radius:6px;background:var(--ac);outline:none;margin:0;}
  .axis input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:24px;height:24px;border-radius:50%;background:#fff;border:3px solid var(--ac);box-shadow:0 1px 4px rgba(0,0,0,.28);cursor:grab;}
  .axis input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:#fff;border:3px solid var(--ac);box-shadow:0 1px 4px rgba(0,0,0,.28);cursor:grab;}
  .poles{display:flex;justify-content:space-between;font-size:12px;color:var(--sub);margin-top:6px;}
  .poles b{color:var(--ink);font-weight:700;}
  .axis-info{display:none;margin-top:9px;background:#faf9fd;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:12px;line-height:1.65;}
  .axis-info .t{font-weight:800;margin-bottom:3px;}
  .axis-info .s{color:var(--accent);font-weight:700;}

  .cog-top{font-size:12.5px;color:var(--sub);margin-bottom:10px;}
  .cog-top b{color:var(--ink);}
  .cog{margin:9px 0;}
  .cog-h{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;}
  .cog-nm{font-weight:800;} .cog-sc{font-weight:900;color:var(--sub);font-size:12px;}
  .cog-bar{height:9px;border-radius:6px;background:#ececf2;overflow:hidden;margin:3px 0 2px;}
  .cog-fill{height:100%;border-radius:6px;transition:width .12s;}
  .cog-d{font-size:11px;color:var(--sub);line-height:1.45;}

  .alt-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12.5px;padding:7px 0;border-bottom:1px dashed var(--line);}
  .alt-axis{font-weight:700;} .alt-arrow{color:var(--sub);} .alt-nm{color:var(--sub);}
  .sub{color:var(--sub);font-size:12px;}

  .actions{display:flex;gap:8px;margin-top:24px;flex-wrap:wrap;}
  .cmp-row{display:grid;grid-template-columns:128px 1fr;gap:12px;align-items:center;padding:10px 4px;border-bottom:1px solid var(--line);}
  @media(max-width:760px){.cmp-row{grid-template-columns:90px 1fr;}}
  .cmp-name{font-weight:700;font-size:13px;display:flex;flex-direction:column;gap:4px;}
  .cmp-name .cl{font-size:10px;color:var(--sub);font-weight:600;}
  .cmp-bars{display:flex;flex-direction:column;gap:5px;}
  .cmp-bar{height:8px;border-radius:5px;position:relative;}
  .cmp-dot{position:absolute;top:50%;width:13px;height:13px;border-radius:50%;background:#fff;transform:translate(-50%,-50%);}
  .seg{font-size:11px;color:var(--sub);display:flex;justify-content:space-between;margin-bottom:2px;}
  .cmp-pick{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
  .cmp-pick select{flex:1;min-width:0;font-family:inherit;font-size:14px;font-weight:700;padding:9px 10px;border-radius:10px;border:1px solid var(--line);background:#fff;color:var(--ink);}
  .cmp-x{font-weight:800;color:var(--sub);}
  .compat-head{display:flex;align-items:center;gap:7px;flex-wrap:wrap;font-size:15px;margin:14px 0 12px;}
  .compat-score{font-size:14px;font-weight:700;margin-bottom:14px;}
  .compat-score b{font-size:26px;color:var(--accent);vertical-align:-2px;}
  .cb-row{margin:9px 0;}
  .cb-l{font-size:12.5px;font-weight:700;display:flex;justify-content:space-between;margin-bottom:3px;}
  .cb-v{color:var(--accent);font-weight:900;}
  .cb-bar{height:10px;border-radius:6px;background:#ececf2;overflow:hidden;}
  .cb-fill{height:100%;background:linear-gradient(90deg,#88619a,#f25e62);border-radius:6px;transition:width .15s;}
  .ca-row{display:flex;gap:9px;align-items:flex-start;font-size:12.7px;line-height:1.62;padding:8px 0;border-bottom:1px dashed var(--line);}
  .ca-mk{font-size:15px;flex-shrink:0;}
  .radar{width:100%;max-width:290px;display:block;margin:4px auto 10px;}
  .gchk-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
  .gchk{font-size:12.5px;font-weight:600;background:#f3eef8;border:1px solid var(--line);border-radius:9px;padding:6px 10px;display:flex;align-items:center;gap:5px;cursor:pointer;}
  .gchk input{accent-color:var(--accent);width:15px;height:15px;}
  .gsum{font-size:14px;font-weight:700;margin:4px 0 10px;}
  .gsum b{font-size:21px;color:var(--accent);}
  .gmtx-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;}
  .gmtx{border-collapse:collapse;font-size:12px;margin:0 auto;}
  .gmtx th{background:#f3eef8;color:var(--ink);font-weight:700;padding:6px 8px;border:1px solid var(--line);white-space:nowrap;}
  .gmtx td{padding:7px 10px;border:1px solid var(--line);text-align:center;font-weight:800;color:#3a3a44;}
  .gmtx td.diag{background:#faf9fd;color:#cfcdd8;}
  .gpair{font-size:12.5px;margin-top:8px;}
  .rank{margin:6px 0 14px;padding:0;list-style:none;counter-reset:r;}
  .rank li{display:flex;align-items:center;gap:9px;font-size:12.8px;padding:6px 2px;border-bottom:1px dashed var(--line);counter-increment:r;}
  .rank li::before{content:counter(r);min-width:21px;height:21px;display:inline-flex;align-items:center;justify-content:center;background:var(--accent);color:#fff;border-radius:50%;font-size:11px;font-weight:800;flex-shrink:0;}
  .rank li:nth-child(1)::before{background:#e3b341;} .rank li:nth-child(2)::before{background:#b6b6c2;} .rank li:nth-child(3)::before{background:#cd8b5a;}
  .rank .rk-n{flex:1;font-weight:600;}
  .rank .rk-s{font-weight:900;color:var(--accent);}
  .tabs{display:flex;gap:6px;}
  .tabs button{background:#fff;color:var(--sub);border:1px solid var(--line);font-weight:700;}
  .tabs button.on{background:var(--accent);color:#fff;border-color:var(--accent);}
  .hint{font-size:11px;color:var(--sub);margin-top:18px;line-height:1.7;}
  input[type=file]{display:none;}
  /* テスト */
  .test-start{padding:10px 4px;}
  .ts-h{font-size:18px;margin:6px 0;}
  .ts-d{font-size:13px;color:var(--sub);line-height:1.7;margin:0 0 14px;}
  .ts-name{border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:15px;width:100%;background:#fcfbfe;}
  .ts-name:focus{outline:none;border-color:var(--accent);}
  #testStartBtn{margin-top:14px;}
  .quiz-top{display:flex;align-items:center;gap:10px;position:sticky;top:0;background:var(--card);padding:8px 0 10px;z-index:5;}
  .prog-bar{flex:1;height:9px;background:#ececf2;border-radius:6px;overflow:hidden;}
  .prog-fill{height:100%;background:linear-gradient(90deg,#88619a,#f25e62);border-radius:6px;transition:width .2s;}
  .q{padding:14px 2px;border-bottom:1px solid var(--line);}
  .q-t{font-size:14px;font-weight:600;line-height:1.55;margin-bottom:11px;}
  .q-n{display:inline-block;min-width:22px;color:var(--sub);font-weight:800;font-size:12px;}
  .likert-wrap{display:flex;align-items:center;justify-content:center;gap:7px;}
  .likert{display:flex;align-items:center;gap:9px;}
  .lk{width:var(--sz);height:var(--sz);min-width:var(--sz);border-radius:50%;border:2px solid var(--col);background:#fff;padding:0;}
  .lk.sel{background:var(--col);box-shadow:0 0 0 3px rgba(136,97,154,.18);}
  .lk-end{font-size:10px;color:var(--sub);white-space:nowrap;}
  .lk-end.agree{color:#2c9d6b;}
  .quiz-foot{position:sticky;bottom:0;background:var(--card);padding:12px 0;margin-top:6px;}
  #seeResult{width:100%;padding:13px;font-size:15px;}
  #seeResult:disabled{opacity:.45;cursor:default;}
  .res-actions{display:flex;flex-direction:column;gap:8px;}
  .res-actions button{padding:12px;font-size:14px;}
  .res-link{display:flex;gap:8px;margin-top:10px;}
  .res-link select{flex:1;min-width:0;font-family:inherit;font-size:13px;padding:9px;border-radius:10px;border:1px solid var(--line);background:#fff;}
  /* ズレ */
  .gap-box{background:#fff7f3;border:1px solid #f3d7cb;border-radius:12px;padding:12px 14px;margin-bottom:14px;}
  .gap-row{display:flex;align-items:center;gap:8px;font-size:12px;padding:5px 0;border-bottom:1px dashed #f0ddd4;flex-wrap:wrap;}
  .gap-ax{font-weight:700;min-width:74px;}
  .gap-v{color:var(--sub);} .gap-v b{color:var(--ink);}
  .gap-mk{margin-left:auto;}
  .gap-verdict{font-size:12.5px;font-weight:700;margin-top:9px;color:#b3502f;}
  /* シェア画像モーダル */
  #imgModal{display:none;position:fixed;inset:0;z-index:120;align-items:center;justify-content:center;padding:20px;}
  .im-back{position:absolute;inset:0;background:rgba(20,15,30,.6);}
  .im-box{position:relative;background:#fff;border-radius:16px;padding:14px;max-width:380px;width:100%;max-height:90vh;overflow:auto;text-align:center;}
  .im-box img{width:100%;border-radius:10px;display:block;}
  .im-act{display:flex;gap:8px;margin-top:10px;}
  .im-dl{flex:1;text-decoration:none;text-align:center;background:var(--accent);color:#fff;font-weight:700;padding:10px;border-radius:10px;font-size:14px;}
  .im-close{background:#fff;color:var(--ink);border:1px solid var(--line);font-weight:600;}
  .im-hint{font-size:11px;color:var(--sub);margin-top:8px;}
  #toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);
    background:#2b2b33;color:#fff;font-size:13px;font-weight:700;padding:10px 18px;border-radius:22px;
    box-shadow:0 4px 16px rgba(0,0,0,.3);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:99;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
  <div class="topbar">
    <div class="logo">M</div>
    <h1>MBTI 推定ノート</h1>
    <div class="grow"></div>
    <div class="tabs">
      <button id="tabEdit" class="on">編集</button>
      <button id="tabCmp">比較</button>
      <button id="tabCompat">相性</button>
      <button id="tabTest">診断</button>
    </div>
    <button class="ghost mini" id="btnExport">書き出し</button>
    <button class="ghost mini" id="btnImport">読み込み</button>
    <input type="file" id="fileImport" accept="application/json">
  </div>

  <div class="app">
    <div class="panel">
      <div class="roster-head">
        <h2>名簿</h2>
        <button class="mini" id="btnAdd">＋ 人を追加</button>
      </div>
      <div class="roster-list" id="roster"></div>
    </div>
    <div class="panel detail" id="detail"></div>
  </div>

<script>
const AXES = [
  {key:'mind',    title:'エネルギー',        left:{l:'E',name:'外向型'},   right:{l:'I',name:'内向型'}, cssc:'--c-mind'},
  {key:'energy',  title:'意識',              left:{l:'N',name:'直感型'},   right:{l:'S',name:'現実型'}, cssc:'--c-energy'},
  {key:'nature',  title:'性質',              left:{l:'T',name:'思考型'},   right:{l:'F',name:'感情型'}, cssc:'--c-nature'},
  {key:'tactics', title:'戦術',              left:{l:'J',name:'計画型'},   right:{l:'P',name:'探索型'}, cssc:'--c-tactics'},
  {key:'identity',title:'アイデンティティ',  left:{l:'A',name:'自己主張型'},right:{l:'T',name:'激動型'}, cssc:'--c-identity'},
];
const AXIS_INFO = {
  mind:['エネルギーの充電方法と注意の向き先',
    '外向型(E)：人と関わり外で動くことで元気が湧く。考えるより先に口に出す・行動する',
    '内向型(I)：一人の時間で回復する。内側で十分考えてから外に出す',
    '%が高いほどその傾向がハッキリ。50%付近は社交的にも内省的にもなれる中間で、状況で切り替わる'],
  energy:['情報をどう受け取るか',
    '直感型(N)：全体像・意味・可能性・未来を見る。「なぜ／もし～なら」が口ぐせ',
    '現実型(S)：事実・五感・具体・今を見る。「実際どうなのか」を重んじる',
    '高いほど抽象寄り／具体寄りに振り切る。中間は理屈と現実を両方使い分ける'],
  nature:['物事をどう判断するか',
    '思考型(T)：論理・一貫性・効率・公平さで決める。正しさ優先',
    '感情型(F)：価値観・人への影響・調和で決める。納得や気持ち優先',
    '高いほど頭／心に寄る。中間は場面で天秤の置き方を変える'],
  tactics:['外の世界にどう接するか',
    '計画型(J)：決めて・段取って・終わらせたい。秩序と締切が安心',
    '探索型(P)：選択肢を開いておき臨機応変に動く。縛られたくない',
    '高いほど計画的／即興的にハッキリ。中間はゆるく計画しつつ融通もきく'],
  identity:['自分をどう感じているか（A／T）',
    '自己主張型(A)：自信があり動じにくい。結果に満足しやすく引きずらない',
    '激動型(T)：敏感で完璧主義。常に改善を求め、感情が揺れやすい',
    '高いほど安定／敏感がハッキリ。中間はその時々で揺れる'],
};
const TYPES = {
  INTJ:['建築家','想像力豊かで戦略的、すべてに計画を持つ思想家'],
  INTP:['論理学者','飽くなき知識欲を持つ革新的な発明家'],
  ENTJ:['指揮官','大胆で想像力豊か、意志の強い指導者'],
  ENTP:['討論者','賢くて好奇心旺盛、知的な挑戦を楽しむ'],
  INFJ:['提唱者','物静かで神秘的だが、人々を強く鼓舞する理想主義者'],
  INFP:['仲介者','詩的で親切、いつも大義のために動きたい利他家'],
  ENFJ:['主人公','カリスマ性があり、人を惹きつけ励ますリーダー'],
  ENFP:['運動家','情熱的で創造力豊か、自由を愛する社交家'],
  ISTJ:['管理者','実直で事実を重んじる、信頼できる現実家'],
  ISFJ:['擁護者','献身的で温かく、いつでも誰かを守ろうとする'],
  ESTJ:['幹部','物事と人をまとめる、優れた管理者'],
  ESFJ:['領事','思いやり深く社交的、面倒見のいい人気者'],
  ISTP:['巨匠','大胆で実践的、あらゆる道具を使いこなす実験家'],

function uid(){ return 'p'+Date.now().toString(36)+Math.floor(Math.random()*1e4).toString(36); }
function newPerson(name){ return {id:uid(), name:name||'名前なし', memo:'', v:{mind:50,energy:50,nature:50,tactics:50,identity:50}}; }

function letterFor(ax,val){ return val<50 ? ax.left.l : ax.right.l; }
function domFor(ax,val){ const left=val<50; return {name:left?ax.left.name:ax.right.name, pct:left?(100-val):val}; }
function typeCode(p){
  const c = AXES.slice(0,4).map(a=>letterFor(a,p.v[a.key])).join('');
  return {four:c, id:letterFor(AXES[4],p.v.identity), full:c+'-'+letterFor(AXES[4],p.v.identity)};
}
function groupOf(four){
  const se=four[1], tf=four[2], jp=four[3];
  if(se==='N') return tf==='T' ? '分析家':'外交官';
  return jp==='J' ? '番人':'探検家';
}
function strength(pct){
  if(pct>=80) return {t:'振り切り', c:'#c0392b'};
  if(pct>=65) return {t:'しっかり', c:'#2c7a4b'};
  if(pct>=56) return {t:'やや',     c:'#b8860b'};
  return {t:'拮抗', c:'#8a8a98'};
}
function clarity(p){
  const core=['mind','energy','nature','tactics'];
  const avg=core.reduce((s,k)=>s+Math.abs(p.v[k]-50)*2,0)/core.length;
  let label,c;
  if(avg>=70){label='くっきり型';c='#2c7a4b';}
  else if(avg>=40){label='ほどほど';c='#b8860b';}
  else{label='ふんわり型';c='#8a8a98';}
  return {score:Math.round(avg),label,c};
}
// 8 cognitive functions, continuous score from the 4 core axes (type-dynamics weighted)
function funcScores(p){
  const I=p.v.mind/100, E=1-I;
  const S=p.v.energy/100, N=1-S;
  const F=p.v.nature/100, T=1-F;
  const P=p.v.tactics/100, J=1-P;
  const cat={Ni:N,Ne:N,Si:S,Se:S,Ti:T,Te:T,Fi:F,Fe:F};
  const eHi = E*1.0 + I*0.7;          // 外向機能の高さ係数（Eなら主機能・Iなら補助）
  const iHi = I*1.0 + E*0.7;          // 内向機能の高さ係数
  const h = { eJ:J*eHi, eP:P*eHi, iP:J*iHi, iJ:P*iHi }; // J→外向判断/内向知覚, P→外向知覚/内向判断
  const combo={Ni:'iP',Si:'iP',Ne:'eP',Se:'eP',Ti:'iJ',Fi:'iJ',Te:'eJ',Fe:'eJ'};
  return Object.keys(cat).map(nm=>{ const raw=100*cat[nm]*h[combo[nm]]; return {name:nm, score:Math.round(raw), raw}; })
               .sort((a,b)=>b.raw-a.raw);
}
const PERC=['Ni','Ne','Si','Se'], JUDG=['Ti','Te','Fi','Fe'];
function altTypes(p){
  const core=AXES.slice(0,4);
  const base=core.map(a=>letterFor(a,p.v[a.key]));
  const cands=[];
  core.forEach((a,i)=>{
    const val=p.v[a.key];
    if(Math.abs(val-50)<=10){
      const f=base.slice();
      f[i]=(letterFor(a,val)===a.left.l)?a.right.l:a.left.l;
      const ft=f.join('');
      cands.push({axis:a.title, type:ft, name:TYPES[ft][0], pct:val<50?100-val:val});
    }
  });
  return cands.sort((x,y)=>x.pct-y.pct);
}
function adaptiveDesc(p){
  const t=typeCode(p), tn=TYPES[t.four], cl=clarity(p);
  let s = tn[1] + '。';
  if(cl.score>=70) s+=`型がはっきり出ていて、${t.four}らしさが安定して表れるタイプ。`;
  else if(cl.score>=40) s+=`おおむね${t.four}だが、場面によって他の面ものぞく。`;
  else s+=`型はゆるやかで、状況次第でいくつかのタイプを行き来する。`;
  s+=`<br><b>${IDENT[t.id][0]}</b>：${IDENT[t.id][1]}`;
  return s;
}

/* ---------- helpers ---------- */
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function hexA(hex,a){ const n=parseInt(hex.slice(1),16); return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`; }
function shade(hex,p){ let n=parseInt(hex.slice(1),16),r=n>>16&255,g=n>>8&255,b=n&255;
  const f=t=>Math.max(0,Math.min(255,Math.round(t+(t*p/100)))); return `rgb(${f(r)},${f(g)},${f(b)})`; }
function axisLabelHTML(ax,val){ const d=domFor(ax,val), st=strength(d.pct);
  return `${ax.title}：<span class="pct">${d.pct}%</span> ${d.name}<span class="stag" style="background:${st.c}">${st.t}</span>`; }
function radarSVG(p){
  const fs=funcScores(p); const sc={}; fs.forEach(f=>sc[f.name]=f.score);
  const order=['Ni','Ne','Si','Se','Ti','Te','Fi','Fe'];
  const cx=120, cy=128, R=78;
  const ang=i=>(-90+i*45)*Math.PI/180;
  const pt=(i,r)=>[(cx+r*Math.cos(ang(i))).toFixed(1),(cy+r*Math.sin(ang(i))).toFixed(1)];
  let grid='';
  [25,50,75,100].forEach(rr=>{ const pts=order.map((_,i)=>pt(i,R*rr/100).join(',')).join(' ');
    grid+=`<polygon points="${pts}" fill="none" stroke="#e6e4ee" stroke-width="1"/>`; });
  let axes=''; order.forEach((_,i)=>{ const [x,y]=pt(i,R); axes+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#e6e4ee" stroke-width="1"/>`; });
  const dpts=order.map((nm,i)=>pt(i,R*(sc[nm]||0)/100).join(',')).join(' ');
  let dots='', labels='';
  order.forEach((nm,i)=>{ const col=FCOLOR[nm]; const [dx,dy]=pt(i,R*(sc[nm]||0)/100); const [lx,ly]=pt(i,R+16);
    dots+=`<circle cx="${dx}" cy="${dy}" r="2.8" fill="${col}"/>`;
    labels+=`<text x="${lx}" y="${ly}" font-size="11" font-weight="800" fill="${col}" text-anchor="middle" dominant-baseline="middle">${nm}</text>`; });
  return `<svg viewBox="0 0 240 256" class="radar">${grid}${axes}<polygon points="${dpts}" fill="rgba(136,97,154,.18)" stroke="#88619a" stroke-width="2"/>${dots}${labels}</svg>`;
}
function cogHTML(p){
  const fs=funcScores(p);
  const topP=fs.filter(f=>PERC.includes(f.name))[0];   // 知覚系トップ
  const topJ=fs.filter(f=>JUDG.includes(f.name))[0];   // 判断系トップ
  const pair=[topP,topJ].sort((a,b)=>b.raw-a.raw).map(f=>`${f.name} ${FN[f.name][0]}`).join(' ／ ');
  const rows=fs.map(f=>{ const col=FCOLOR[f.name];
    return `<div class="cog">
      <div class="cog-h"><span class="cog-nm" style="color:${col}">${f.name}　${FN[f.name][0]}</span><span class="cog-sc">${f.score}</span></div>
      <div class="cog-bar"><div class="cog-fill" style="width:${f.score}%;background:${col}"></div></div>
      <div class="cog-d">${FN[f.name][1]}</div></div>`; }).join('');
  return `<div class="cog-top">軸となる2機能（知覚＋判断）：<b>${pair}</b></div>${radarSVG(p)}${rows}`;
}
function altHTML(p){
  const c=altTypes(p);
  if(!c.length) return `<div class="sub">4つの軸がわりとはっきりしていて、すぐ隣の別タイプは無し。</div>`;

    <span class="badge" style="background:${cssv(GROUPS[groupOf(x.type)])}">${x.type}</span>
    <span class="alt-nm">${x.name}</span></div>`).join('');
}

/* ---------- 詳しい診断（%を織り込む） ---------- */
function axisReading(ax,val){
  const left=val<50, pole=left?ax.left:ax.right, pct=left?(100-val):val;
  if(pct<56) return `<b>${ax.title}</b>：${ax.left.name}と${ax.right.name}のどっちにも転べる中間（${pct}%）。状況次第で両方使い分ける、決めつけにくいとこ。`;
  const intens = pct>=80?'かなり強めの':(pct>=65?'しっかり':'ちょい');
  return `<b>${ax.title}</b>：${intens}<b>${pole.name}</b>（${pct}%）。${POLE_DESC[pole.l]}。`;
}
function diagOverview(p){
  const t=typeCode(p), tn=TYPES[t.four], cl=clarity(p), fs=funcScores(p), dom=fs[0];
  let strong=null, weak=null;
  AXES.slice(0,4).forEach(a=>{ const d=domFor(a,p.v[a.key]);
    if(!strong||d.pct>strong.pct) strong={name:d.name,pct:d.pct};
    if(!weak||d.pct<weak.pct) weak={name:d.name,pct:d.pct}; });
  let s=`<b>${t.full}・${tn[0]}</b>（${groupOf(t.four)}グループ）。${tn[1]}って感じ。`;
  if(cl.score>=70) s+=`4軸ともしっかり振り切ってる<b>くっきり型</b>（くっきり度${cl.score}）で、${t.four}らしさが安定して出るタイプ。`;
  else if(cl.score>=40) s+=`振れ方は中くらいの<b>ほどほど型</b>（くっきり度${cl.score}）。ベースは${t.four}だけど、場面で別の顔も出る。`;
  else s+=`軸が中央寄りで<b>ふんわり型</b>（くっきり度${cl.score}）。${t.four}を芯にしつつ、状況でいろんなタイプを行き来する掴みどころのなさがある。`;
  s+=`<br>一番ハッキリ出てるのは<b>${strong.name}（${strong.pct}%）</b>、逆に揺れてるのは<b>${weak.name}（${weak.pct}%）</b>あたり。`;
  s+=`心のエンジンになってるのは<b>${dom.name}（${FN[dom.name][0]}）</b>＝${FN[dom.name][1]}。`;
  return s;
}
function diagStrength(p){
  const fs=funcScores(p);
  const tp=fs.filter(f=>PERC.includes(f.name))[0], tj=fs.filter(f=>JUDG.includes(f.name))[0];
  const it=[tp,tj].sort((a,b)=>b.raw-a.raw).map(f=>`<b>${f.name}</b>：${FUNC_STRENGTH[f.name]}`);
  if(letterFor(AXES[4],p.v.identity)==='A' && domFor(AXES[4],p.v.identity).pct>=65)
    it.push('プレッシャーに強くて、失敗や批判を引きずらず前に進める');
  return '<ul>'+it.map(i=>`<li>${i}</li>`).join('')+'</ul>';
}
function diagWeak(p){
  const fs=funcScores(p), inf=fs[fs.length-1];
  const it=[`苦手になりやすいのは：${FUNC_WEAK[inf.name]}（最下位の<b>${inf.name}</b>）`];
  let ex=null;
  AXES.slice(0,4).forEach(a=>{ const d=domFor(a,p.v[a.key]);
    if(d.pct>=80 && (!ex||d.pct>ex.pct)){ const opp=(letterFor(a,p.v[a.key])===a.left.l)?a.right.name:a.left.name; ex={pole:d.name,pct:d.pct,opp}; } });
  if(ex) it.push(`<b>${ex.pole}</b>に振り切ってる（${ex.pct}%）ぶん、${ex.opp}的な見方が抜けがち`);
  if(letterFor(AXES[4],p.v.identity)==='T' && domFor(AXES[4],p.v.identity).pct>=65)
    it.push('激動型が強めで、完璧主義で自分を追い込みやすい・人の評価に揺れやすい');
  return '<ul>'+it.map(i=>`<li>${i}</li>`).join('')+'</ul>';
}
function diagIdentity(p){
  const id=letterFor(AXES[4],p.v.identity), d=domFor(AXES[4],p.v.identity);
  if(d.pct<56) return `自己主張型と激動型のちょうど中間（${d.pct}%）。基本は落ち着いてるけど、状況によっては敏感に揺れることもある。`;
  const intens=d.pct>=80?'かなり強めの':(d.pct>=65?'しっかり':'ちょい');
  if(id==='A') return `${intens}<b>自己主張型</b>（${d.pct}%）。自信があって動じにくいし、失敗や人の評価を引きずらない。裏を返すと、危機感とか自己点検が薄くなりがち。`;
  return `${intens}<b>激動型</b>（${d.pct}%）。「もっと良くしたい」が強くて伸びしろ意欲は高い。けど自分を追い込みやすくて、感情が揺れやすい面も。`;
}
function generateDiag(p){
  return `<div class="diag-sec"><h4>総評</h4><p>${diagOverview(p)}</p></div>
    <div class="diag-sec"><h4>4つの軸の読み（%を反映）</h4><ul>${AXES.slice(0,4).map(ax=>`<li>${axisReading(ax,p.v[ax.key])}</li>`).join('')}</ul></div>
    <div class="diag-sec"><h4>強みとして出やすい</h4>${diagStrength(p)}</div>
    <div class="diag-sec"><h4>つまずきやすい</h4>${diagWeak(p)}</div>
    <div class="diag-sec"><h4>自己認識（A／T）</h4><p>${diagIdentity(p)}</p></div>`;
}

function copyText(txt){
  let ok=false;
  try{ const ta=document.createElement('textarea'); ta.value=txt; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.focus(); ta.select(); ok=document.execCommand('copy'); document.body.removeChild(ta); }catch(e){}
  if(ok){ toast('コピーした！AIチャットに貼って'); return; }
  if(navigator.clipboard){ navigator.clipboard.writeText(txt).then(()=>toast('コピーした！AIチャットに貼って')).catch(()=>showCopyFallback(txt)); }
  else showCopyFallback(txt);
}
function showCopyFallback(txt){ window.prompt('下のテキストをコピーしてAIに貼ってね（Ctrl+C）', txt); }
function toast(msg){
  let el=document.getElementById('toast');
  if(!el){ el=document.createElement('div'); el.id='toast'; document.body.appendChild(el); }
  el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),1900);
}

  state.people.forEach(p=>{

    row.className='person'+(p.id===selId&&mode==='edit'?' active':'');
    row.innerHTML=`<span class="nm"></span><span class="badge" style="background:${col}">${t.full}</span><button class="del" title="削除">×</button>`;
    row.querySelector('.nm').textContent=p.name;
    row.onclick=e=>{ if(e.target.classList.contains('del'))return; selId=p.id; mode='edit'; setTab('edit'); render(); };

  });
}

/* ---------- 相性 ---------- */
function compatScores(a,b){
  const g=k=>Math.abs(a.v[k]-b.v[k]);
  const gNS=g('energy'), gTF=g('nature'), gJP=g('tactics'), gEI=g('mind');
  const smooth = Math.max(0,Math.round(100-(gNS*0.30+gTF*0.30+gJP*0.30+gEI*0.10)));
  const complement = Math.min(100,Math.round(gTF*0.5+gEI*0.3+gNS*0.2));
  return {smooth,complement};
}
function compatLabel(sc){
  if(sc.smooth>=68 && sc.complement<35) return '似た者同士・安定型';
  if(sc.smooth>=58 && sc.complement>=42) return '好相性・噛み合いつつ補える';
  if(sc.smooth<48 && sc.complement>=48) return '凸凹補完型（違いを活かせるかが鍵）';
  if(sc.smooth<48) return '要すり合わせ型';
  return 'バランス型';
}
function perAxisCompat(a,b){
  const L=(i,p)=>letterFor(AXES[i],p.v[AXES[i].key]);
  const o=[];
  let la=L(0,a),lb=L(0,b);
  o.push(la===lb?(la==='I'?{x:'エネルギー',m:'🟢',t:'二人とも内向＝静かで落ち着いた時間を心地よく共有できる。外の予定や社交を誰が回すかは課題になりがち'}
    :{x:'エネルギー',m:'🟢',t:'外向同士で活発・賑やか。反面、二人とも一人でゆっくりの時間が不足しやすい'})
    :{x:'エネルギー',m:'🔵',t:'片方が外で動き、片方が内で受け止める。社交と休息の役割分担がしやすい補完ペア'});
  la=L(1,a);lb=L(1,b);
  o.push(la===lb?(la==='N'?{x:'意識',m:'🟢',t:'抽象・将来・「もし〜なら」の話で盛り上がれる。会話のレイヤーが合う'}
    :{x:'意識',m:'🟢',t:'現実的・具体的な話が噛み合い、地に足ついた生活を作りやすい'})
    :{x:'意識',m:'🔵',t:'片方は理想・可能性、片方は現実・具体。噛み合わない時もあるが互いの抜けを補える'});
  la=L(2,a);lb=L(2,b);
  o.push(la===lb?(la==='T'?{x:'性質',m:'🟡',t:'論理ベースでドライに会話できて楽。ただし感情のケアは二人とも薄くなりがち'}
    :{x:'性質',m:'🟢',t:'気持ちを大事にし合える温かい関係。反面、厳しい決断や問題解決が後回しになりやすい'})
    :{x:'性質',m:'🔵',t:'片方が論理・片方が共感。バランスは取れるが「冷たい／感情的すぎ」のすれ違いが起きる定番ポイント'});
  la=L(3,a);lb=L(3,b);
  o.push(la===lb?(la==='J'?{x:'戦術',m:'🟢',t:'計画・段取り・締切感が揃い、生活がスムーズに回る'}
    :{x:'戦術',m:'🟡',t:'互いに自由で縛らないのが楽。でも「誰も段取らない」で物事が進まない問題も'})
    :{x:'戦術',m:'🟡',t:'計画派と即興派。予定・片付け・決断スピードで最もぶつかりやすい摩擦点。簡単なルールを決めると楽'});
  la=L(4,a);lb=L(4,b);
  o.push(la===lb?(la==='A'?{x:'アイデンティティ',m:'🟢',t:'二人とも動じず安定。穏やかな反面、細かい感情の機微を取りこぼさない意識を'}
    :{x:'アイデンティティ',m:'🟡',t:'二人とも繊細＝不安や落ち込みが連鎖しやすい。意識して安心を作り合うのが鍵'})
    :{x:'アイデンティティ',m:'🔵',t:'自己主張型が土台になり激動型の繊細さを支える好相性。ただし直球が繊細側に刺さりすぎないよう注意'});
  return o;
}
function cbar(label,val){ return `<div class="cb-row"><div class="cb-l">${label}<span class="cb-v">${val}</span></div><div class="cb-bar"><div class="cb-fill" style="width:${val}%"></div></div></div>`; }
function aiPromptPair(a,b){
  const fmt=p=>{const t=typeCode(p),cl=clarity(p),ax=AXES.map(x=>{const d=domFor(x,p.v[x.key]);return `${d.name}${d.pct}%`;}).join('/');
    return `${p.name}：${t.full}（${TYPES[t.four][0]}）くっきり度${cl.score}／${ax}／メモ:${p.memo||'なし'}`;};
  return `【MBTI相性メモ】\n①${fmt(a)}\n②${fmt(b)}\n\n↑この二人の相性を、%の強弱まで踏まえて深掘り分析して（噛み合う所・すれ違う所・うまくやるコツ）。`;
}
function renderCompat(){
  if(state.people.length<2){ elDetail.innerHTML='<div class="empty">2人以上登録すると相性が見られます。<br>「編集」タブから人を追加してね。</div>'; return; }
  elDetail.innerHTML=`<div class="tabs" style="margin-bottom:12px">
      <button id="cmPair" class="${compatMode==='pair'?'on':''}">ペア相性</button>
      <button id="cmGroup" class="${compatMode==='group'?'on':''}">グループ相性</button></div><div id="compatMain"></div>`;
  document.getElementById('cmPair').onclick=()=>{ compatMode='pair'; renderCompat(); };
  document.getElementById('cmGroup').onclick=()=>{ compatMode='group'; renderCompat(); };
  if(compatMode==='group') renderCompatGroupInto(document.getElementById('compatMain'));
  else renderCompatPairInto(document.getElementById('compatMain'));
}
function renderCompatPairInto(host){
  if(!state.people.find(x=>x.id===compatA)) compatA=state.people[0].id;
  if(!state.people.find(x=>x.id===compatB)) compatB=state.people[1].id;
  const opt=sel=>state.people.map(p=>`<option value="${p.id}" ${p.id===sel?'selected':''}>${esc(p.name)}</option>`).join('');
  host.innerHTML=`<div class="cmp-pick"><select id="selA">${opt(compatA)}</select><span class="cmp-x">×</span><select id="selB">${opt(compatB)}</select></div><div id="compatBody"></div>`;
  document.getElementById('selA').onchange=e=>{compatA=e.target.value; paintCompat();};
  document.getElementById('selB').onchange=e=>{compatB=e.target.value; paintCompat();};

function shortName(n){ return n.length>5 ? n.slice(0,5)+'…' : n; }
function scoreColor(s){ if(s>=70) return '#d6f0e2'; if(s>=55) return '#fbf0d4'; return '#fadbd9'; }
function renderCompatGroupInto(host){
  compatGroup=compatGroup.filter(id=>state.people.find(p=>p.id===id));
  if(compatGroup.length<2) compatGroup=state.people.map(p=>p.id);
  const checks=state.people.map(p=>`<label class="gchk"><input type="checkbox" data-id="${p.id}" ${compatGroup.includes(p.id)?'checked':''}> ${esc(p.name)}</label>`).join('');
  host.innerHTML=`<div class="sub" style="margin-bottom:8px">比較する人をチェック（3人以上で相関が見やすい）</div><div class="gchk-wrap">${checks}</div><div id="groupMain"></div>`;
  host.querySelectorAll('.gchk input').forEach(ch=>ch.onchange=()=>{ const id=ch.dataset.id;
    if(ch.checked){ if(!compatGroup.includes(id)) compatGroup.push(id); } else compatGroup=compatGroup.filter(x=>x!==id);
    paintGroup(); });
  paintGroup();
}
function paintGroup(){
  const gm=document.getElementById('groupMain'); if(!gm) return;
  const sel=state.people.filter(p=>compatGroup.includes(p.id));
  if(sel.length<2){ gm.innerHTML='<div class="sub" style="margin-top:12px">2人以上にチェックを入れてね。</div>'; return; }
  const pairs=[];
  for(let i=0;i<sel.length;i++) for(let j=i+1;j<sel.length;j++){ pairs.push({a:sel[i],b:sel[j],s:compatScores(sel[i],sel[j]).smooth}); }
  const avg=Math.round(pairs.reduce((t,p)=>t+p.s,0)/pairs.length);
  const head='<th></th>'+sel.map(p=>`<th>${esc(shortName(p.name))}</th>`).join('');
  let body='';
  sel.forEach((r,ri)=>{ let row=`<th>${esc(shortName(r.name))}</th>`;
    sel.forEach((c,ci)=>{ if(ri===ci) row+='<td class="diag">—</td>';
      else { const s=compatScores(r,c).smooth; row+=`<td style="background:${scoreColor(s)}">${s}</td>`; } });
    body+=`<tr>${row}</tr>`; });
  const pairRank=[...pairs].sort((a,b)=>b.s-a.s);
  const fit=sel.map(p=>{ const others=sel.filter(o=>o.id!==p.id);
    return {p, av:Math.round(others.reduce((t,o)=>t+compatScores(p,o).smooth,0)/others.length)}; }).sort((a,b)=>b.av-a.av);
  const pairList=pairRank.map(pr=>`<li><span class="rk-n">${esc(pr.a.name)} × ${esc(pr.b.name)}</span><span class="rk-s">${pr.s}</span></li>`).join('');
  const fitList=fit.map(f=>`<li><span class="rk-n">${esc(f.p.name)}</span><span class="rk-s">${f.av}</span></li>`).join('');
  gm.innerHTML=`<div class="gsum">グループ平均 噛み合い度 <b>${avg}</b>（${sel.length}人・全${pairs.length}ペア）</div>
    <div class="gmtx-wrap"><table class="gmtx"><tr>${head}</tr>${body}</table></div>
    <div class="sec-title" style="margin-top:16px">ペア相性ランキング</div><ol class="rank">${pairList}</ol>
    <div class="sec-title">グループ馴染み度ランキング <span class="sub">高い＝みんなと似て馴染む／低い＝独自色が強い</span></div><ol class="rank">${fitList}</ol>
    <div class="hint">数字＝噛み合い度。低い＝悪いではなく「違う」だけ（補い合えれば良コンビ）。深掘りは「ペア相性」やAI深掘りで。</div>`;
}
function paintCompat(){
  const a=state.people.find(x=>x.id===compatA), b=state.people.find(x=>x.id===compatB);
  const body=document.getElementById('compatBody');
  if(!a||!b){ body.innerHTML=''; return; }
  if(a.id===b.id){ body.innerHTML='<div class="sub" style="margin-top:16px">同じ人どうしは比べられません。別の人を選んでね。</div>'; return; }
  const sc=compatScores(a,b), overall=Math.round(sc.smooth*0.7+sc.complement*0.3);
  const ta=typeCode(a), tb=typeCode(b);
  body.innerHTML=`<div class="compat-head">
      <span class="badge" style="background:${cssv(GROUPS[groupOf(ta.four)])}">${ta.full}</span><b>${esc(a.name)}</b>
      <span class="cmp-x">×</span>
      <b>${esc(b.name)}</b><span class="badge" style="background:${cssv(GROUPS[groupOf(tb.four)])}">${tb.full}</span>
    </div>
    <div class="compat-score">相性スコア <b>${overall}</b> <span class="sub">／ ${compatLabel(sc)}</span></div>
    ${cbar('噛み合い度（似てて楽）',sc.smooth)}
    ${cbar('補い合い度（違いを活かせる）',sc.complement)}
    <div class="sec-title" style="margin-top:18px">軸ごとの相性 <span class="sub">🟢合う ／ 🔵補い合う ／ 🟡注意</span></div>
    ${perAxisCompat(a,b).map(r=>`<div class="ca-row"><span class="ca-mk">${r.m}</span><div><b>${r.x}</b>：${r.t}</div></div>`).join('')}
    <div class="actions"><button id="copyPairBtn">📋 AIで相性を深掘り（コピー）</button></div>
    <div class="hint">スコアはざっくり目安。違い＝悪いではなく、噛み合い度が低くても補い合い度が高ければ良コンビ。深掘りは上のボタン→AIに貼って。</div>`;
  document.getElementById('copyPairBtn').onclick=()=>copyText(aiPromptPair(a,b));
}

    {s:'P',t:'きっちり決めると、窮屈に感じてしまう'},
    {s:'J',t:'その日やることをリスト化して進めるのが好きだ'},
    {s:'P',t:'選択肢は開いたまま、ぎりぎりまで決めたくない'},
  ],
  identity:[
    {s:'A',t:'自分の能力や判断に、おおむね自信がある'},
    {s:'T',t:'些細なことでも、後から「ああすれば」と気に病む'},
    {s:'A',t:'失敗してもあまり引きずらず、すぐ切り替えられる'},
    {s:'T',t:'自分に厳しく、完璧でないと満足できない'},
    {s:'A',t:'他人の評価は、それほど気にならない'},
    {s:'T',t:'他人にどう思われているかが、つい気になる'},
    {s:'A',t:'プレッシャーがかかっても落ち着いていられる'},
    {s:'T',t:'ストレスや不安を感じやすい方だ'},
    {s:'A',t:'自分の選んだ道に、おおむね満足している'},
    {s:'T',t:'成功しても、「まだ足りない」と感じてしまう'},
    {s:'A',t:'細かいことでくよくよ悩むことは少ない'},
    {s:'T',t:'気分の浮き沈みが大きい方だ'},
  ],
};
const QUESTIONS=[];
for(let k=0;k<12;k++){ ['mind','energy','nature','tactics','identity'].forEach(d=>{ const it=QBANK[d][k]; QUESTIONS.push({d,side:it.s,t:it.t}); }); }
const QUESTIONS_QUICK=[]; // 各軸 先頭4問（2問ずつ両方向）＝20問
for(let k=0;k<4;k++){ ['mind','energy','nature','tactics','identity'].forEach(d=>{ const it=QBANK[d][k]; QUESTIONS_QUICK.push({d,side:it.s,t:it.t}); }); }
let testStage='start', testAnswers=[], testName='', testResultV=null, testLen='full', testQ=QUESTIONS;

function scoreTest(ans, qs){
  const sums={mind:0,energy:0,nature:0,tactics:0,identity:0}, cnt={mind:0,energy:0,nature:0,tactics:0,identity:0};
  qs.forEach((q,i)=>{ cnt[q.d]++; const pos=ans[i]; if(pos==null) return; const a=3-pos;
    sums[q.d]+= (q.side===RIGHTPOLE[q.d]?1:-1)*a; });
  const v={};
  for(const k in sums){ const max=cnt[k]*3; v[k]=Math.round(Math.max(0,Math.min(100, 50+(max?sums[k]/max:0)*50))); }
  return v;
}
function likertHTML(i){
  const cfg=[[27,'#2c9d6b'],[22,'#5cb791'],[17,'#a7d4bf'],[14,'#cfcdd8'],[17,'#bda9cb'],[22,'#9a7eb3'],[27,'#7a5a96']];
  let s=''; for(let p=0;p<7;p++){ s+=`<button class="lk" data-i="${i}" data-pos="${p}" style="--sz:${cfg[p][0]}px;--col:${cfg[p][1]}"></button>`; }
  return s;
}
function renderTest(){ if(testStage==='quiz') return renderQuiz(); if(testStage==='result') return renderTestResult(); return renderTestStart(); }
function renderTestStart(){
  const ql=testLen==='quick'?QUESTIONS_QUICK.length:QUESTIONS.length;
  const mins=testLen==='quick'?'2〜3分':'約8分';
  const note=testLen==='quick'?'<br>※簡易版は各軸4問。サッと知りたい人向け（精度はフルより少し粗め）。':'<br>※各軸12問・逆質問入りで、本家相当の精度。';
  elDetail.innerHTML=`<div class="test-start">
    <h3 class="ts-h">MBTI 自己診断テスト</h3>
    <div class="tabs" style="margin:6px 0 12px">
      <button id="lenQuick" class="${testLen==='quick'?'on':''}">簡易（${QUESTIONS_QUICK.length}問）</button>
      <button id="lenFull" class="${testLen==='full'?'on':''}">フル（${QUESTIONS.length}問）</button>
    </div>
    <p class="ts-d">${ql}問・${mins}。直感でテンポよく答えてOK。結果はアプリの全機能（詳しい診断・認知機能・相性）にそのまま使えます。${note}</p>
    <input class="nameInput ts-name" id="testName" placeholder="診断する人の名前（自分なら自分の名前）">
    <button id="testStartBtn">テストを始める</button>
    <p class="hint">※ 回答は端末内だけで処理されます（ネットには送りません）。</p>
  </div>`;
  document.getElementById('testName').value=testName||'';
  document.getElementById('lenQuick').onclick=()=>{ testName=document.getElementById('testName').value; testLen='quick'; renderTestStart(); };
  document.getElementById('lenFull').onclick=()=>{ testName=document.getElementById('testName').value; testLen='full'; renderTestStart(); };
  document.getElementById('testStartBtn').onclick=()=>{ testName=document.getElementById('testName').value.trim();
    testQ = testLen==='quick'?QUESTIONS_QUICK:QUESTIONS;
    testAnswers=new Array(testQ.length).fill(null); testStage='quiz'; renderTest(); window.scrollTo(0,0); };
}
function renderQuiz(){
  const rows=testQ.map((q,i)=>`<div class="q"><div class="q-t"><span class="q-n">${i+1}</span>${q.t}</div>
    <div class="likert-wrap"><span class="lk-end agree">そう思う</span><div class="likert">${likertHTML(i)}</div><span class="lk-end">思わない</span></div></div>`).join('');
  const done=testAnswers.filter(a=>a!=null).length;
  elDetail.innerHTML=`<div class="quiz-top"><button class="ghost mini" id="quizBack">← 戻る</button>
      <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:${done/testQ.length*100}%"></div></div></div>
    <div id="quizList">${rows}</div>
    <div class="quiz-foot"><button id="seeResult" ${done<testQ.length?'disabled':''}>結果を見る（<span id="doneCount">${done}</span>/${testQ.length}）</button></div>`;
  testAnswers.forEach((a,i)=>{ if(a!=null){ const b=elDetail.querySelector(`.lk[data-i="${i}"][data-pos="${a}"]`); if(b) b.classList.add('sel'); } });
  document.getElementById('quizList').onclick=e=>{ const b=e.target.closest('.lk'); if(!b) return;
    const i=+b.dataset.i, pos=+b.dataset.pos;
    b.parentElement.querySelectorAll('.lk').forEach(x=>x.classList.remove('sel')); b.classList.add('sel');
    testAnswers[i]=pos; updateQuizProgress(); };
  document.getElementById('quizBack').onclick=()=>{ testStage='start'; renderTest(); };
  document.getElementById('seeResult').onclick=()=>{ if(testAnswers.some(a=>a==null)){ alert('未回答の質問があります'); return; }
    testResultV=scoreTest(testAnswers, testQ); testStage='result'; renderTest(); window.scrollTo(0,0); };
}
function updateQuizProgress(){
  const done=testAnswers.filter(a=>a!=null).length;
  document.getElementById('doneCount').textContent=done;
  document.getElementById('progFill').style.width=(done/testQ.length*100)+'%';
  document.getElementById('seeResult').disabled = done<testQ.length;
}
function renderTestResult(){
  const v=testResultV, tp={name:testName||'診断結果', memo:'', v};
  const t=typeCode(tp), g=groupOf(t.four), col=cssv(GROUPS[g]), tn=TYPES[t.four], cl=clarity(tp);
  elDetail.innerHTML=`
    <div class="result" style="background:linear-gradient(135deg,${col},${shade(col,-18)})">
      <div class="code">${t.full}</div>
      <div class="meta"><div class="tname">${tn[0]}・${IDENT[t.id][0]}</div><div class="grp">${g}グループ ／ くっきり度 ${cl.score}</div><div class="desc">${tn[1]}</div></div>
    </div>
    <div class="diag-body" style="display:block;margin-bottom:8px">${generateDiag(tp)}</div>
    <div class="sec-title">この結果をどうする？</div>
    <div class="res-actions">
      <button id="resShare">📷 シェア画像を作る</button>
      <button id="resNew">＋ 新しい人として名簿に追加</button>
    </div>
    <div class="res-link"><select id="linkSel"><option value="">― 既存の人に紐付けて見立てと比較 ―</option>${state.people.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('')}</select><button class="ghost" id="resLink">紐付け</button></div>
    <div class="actions"><button class="ghost" id="resRetry">もう一度やる</button></div>`;
  document.getElementById('resShare').onclick=()=>showImageModal(makeShareImage(tp.name,v));
  document.getElementById('resNew').onclick=()=>{ const np=newPerson(tp.name); np.v={...v}; np.source='test'; state.people.push(np); selId=np.id; save(); setTab('edit'); render(); window.scrollTo(0,0); };
  document.getElementById('resLink').onclick=()=>{ const id=document.getElementById('linkSel').value; if(!id){ alert('紐付ける人を選んでね'); return; }
    const p=state.people.find(x=>x.id===id); p.test={...v}; selId=id; save(); setTab('edit'); render(); window.scrollTo(0,0); toast('本人診断を紐付けた！見立てとの差を表示中'); };
  document.getElementById('resRetry').onclick=()=>{ testStage='start'; testResultV=null; renderTest(); };
}

/* ---- シェア画像（canvas） ---- */
function roundRect(x,rx,ry,w,h,r){ x.beginPath(); x.moveTo(rx+r,ry); x.arcTo(rx+w,ry,rx+w,ry+h,r); x.arcTo(rx+w,ry+h,rx,ry+h,r); x.arcTo(rx,ry+h,rx,ry,r); x.arcTo(rx,ry,rx+w,ry,r); x.closePath(); }
function makeShareImage(name,v){
  const t=typeCode({v}), g=groupOf(t.four), col=cssv(GROUPS[g]), tn=TYPES[t.four], cl=clarity({v});
  const W=720,H=940, c=document.createElement('canvas'); c.width=W; c.height=H; const x=c.getContext('2d');
  const gr=x.createLinearGradient(0,0,W,H); gr.addColorStop(0,col); gr.addColorStop(1,shade(col,-24)); x.fillStyle=gr; x.fillRect(0,0,W,H);
  x.fillStyle='rgba(255,255,255,0.96)'; roundRect(x,40,40,W-80,H-80,30); x.fill();
  x.textAlign='center';
  x.fillStyle='#9a98a6'; x.font='bold 24px sans-serif'; x.fillText('MBTI 推定ノート', W/2, 108);
  if(name){ x.fillStyle='#2b2b33'; x.font='bold 30px sans-serif'; x.fillText(name, W/2, 152); }
  x.fillStyle=col; x.font='900 96px sans-serif'; x.fillText(t.full, W/2, 250);
  x.fillStyle='#2b2b33'; x.font='bold 40px sans-serif'; x.fillText(`${tn[0]}・${IDENT[t.id][0]}`, W/2, 312);
  x.fillStyle='#7a7a88'; x.font='bold 23px sans-serif'; x.fillText(`${g}グループ ／ くっきり度 ${cl.score}`, W/2, 352);
  let y=430;
  AXES.forEach(ax=>{ const d=domFor(ax,v[ax.key]), c2=cssv(ax.cssc);
    x.textAlign='left'; x.fillStyle='#2b2b33'; x.font='bold 22px sans-serif';
    x.fillText(`${ax.title}：${d.name} ${d.pct}%`, 95, y-10);
    x.fillStyle='#ececf2'; roundRect(x,95,y,W-190,14,7); x.fill();
    const px=95+(W-190)*(v[ax.key]/100);
    x.fillStyle='#fff'; x.beginPath(); x.arc(px,y+7,12,0,7); x.fill(); x.strokeStyle=c2; x.lineWidth=4; x.stroke();
    y+=86;
  });
  x.textAlign='center'; x.fillStyle='#b3b1bf'; x.font='19px sans-serif'; x.fillText('mbti-note.seikakuhikaku.workers.dev', W/2, H-66);
  return c.toDataURL('image/png');
}
function showImageModal(url){
  let m=document.getElementById('imgModal');
  if(!m){ m=document.createElement('div'); m.id='imgModal'; document.body.appendChild(m); }
  m.innerHTML=`<div class="im-back"></div><div class="im-box"><img src="${url}" alt="診断結果">
    <div class="im-act"><a class="im-dl" href="${url}" download="mbti_result.png">画像を保存</a><button class="im-close">閉じる</button></div>
    <div class="im-hint">スマホは画像を長押し→「写真に追加」でも保存できる</div></div>`;
  m.style.display='flex';
  m.querySelector('.im-back').onclick=()=>m.style.display='none';
  m.querySelector('.im-close').onclick=()=>m.style.display='none';
}

/* ---- 見立て vs 本人診断 のズレ ---- */
function gapPanelHTML(p){
  if(!p.test) return '';
  const est=p.v, tst=p.test, eT=typeCode({v:est}).full, tT=typeCode({v:tst}).full;
  let rows='', match=0;
  AXES.forEach((ax,i)=>{
    const ed=domFor(ax,est[ax.key]), td=domFor(ax,tst[ax.key]);
    const same=letterFor(ax,est[ax.key])===letterFor(ax,tst[ax.key]);
    if(i<4 && same) match++;
    rows+=`<div class="gap-row"><span class="gap-ax">${ax.title}</span><span class="gap-v">見立て <b>${ed.name}${ed.pct}%</b></span><span class="gap-v">本人 <b>${td.name}${td.pct}%</b></span><span class="gap-mk">${same?'🟢':'🔴'}</span></div>`;
  });
  let verdict;
  if(match>=4) verdict='見立てドンピシャ。4軸すべて一致してた。';
  else if(match===3) verdict='見立てはかなり当たってた（4軸中3つ一致）。';
  else if(match===2) verdict='半分当たり・半分ズレ（4軸中2つ一致）。';
  else verdict='本人診断とけっこう違った。先入観が入ってたかも？';
  return `<div class="gap-box"><div class="sec-title" style="margin-top:0">見立て vs 本人診断 <span class="sub">あなたの推定 ${eT} ／ 本人テスト ${tT}</span></div>${rows}<div class="gap-verdict">${verdict}</div>
    <button class="ghost mini" id="gapClear" style="margin-top:8px">本人診断の紐付けを外す</button></div>`;
}

function render(){ renderRoster(); renderDetail(); }

/* ---------- top bar ---------- */
function setTab(m){ mode=m;
  document.getElementById('tabEdit').classList.toggle('on',m==='edit');
  document.getElementById('tabCmp').classList.toggle('on',m==='compare');
  document.getElementById('tabCompat').classList.toggle('on',m==='compat');
  document.getElementById('tabTest').classList.toggle('on',m==='test'); }
document.getElementById('tabEdit').onclick=()=>{ setTab('edit'); render(); };
document.getElementById('tabCmp').onclick=()=>{ setTab('compare'); render(); };
document.getElementById('tabCompat').onclick=()=>{ setTab('compat'); render(); };
document.getElementById('tabTest').onclick=()=>{ setTab('test'); if(mode==='test'){} render(); };
document.getElementById('btnAdd').onclick=()=>{ const p=newPerson('新しい人 '+(state.people.length+1));
  state.people.push(p); selId=p.id; setTab('edit'); save(); render();
  setTimeout(()=>{ const n=document.getElementById('nameI'); if(n){n.focus();n.select();} },30); };
document.getElementById('btnExport').onclick=()=>{ const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='mbti_notes.json'; a.click(); URL.revokeObjectURL(a.href); };
document.getElementById('btnImport').onclick=()=>document.getElementById('fileImport').click();
document.getElementById('fileImport').onchange=e=>{ const f=e.target.files[0]; if(!f)return; const rd=new FileReader();
  rd.onload=()=>{ try{ const j=JSON.parse(rd.result); if(!j.people||!Array.isArray(j.people)) throw 0;
    if(confirm('読み込むと現在のデータに追加されます。続けますか？')){ j.people.forEach(p=>{ p.id=uid(); state.people.push(p); }); save(); render(); }
  }catch(err){ alert('読み込めませんでした（JSON形式が不正です）'); } e.target.value=''; };
  rd.readAsText(f); };

render();
